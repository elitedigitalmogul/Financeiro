<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Dashboard Financeiro Pro</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
  --primary:#27ae60;
  --danger:#e74c3c;
  --info:#2980b9;
  --bg: linear-gradient(135deg,#eef2f7,#dfe6e9);
}

body {
  font-family: 'Segoe UI', sans-serif;
  background: var(--bg);
  padding:20px;
}

.container {
  max-width:1000px;
  margin:auto;
}

.card {
  background:white;
  padding:20px;
  margin-bottom:20px;
  border-radius:16px;
  box-shadow:0 8px 20px rgba(0,0,0,0.08);
  transition:0.2s;
}

.card:hover { transform: translateY(-2px); }

.grid {
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:15px;
}

.kpi-value {
  font-size:22px;
  font-weight:bold;
}

input,select,button {
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:1px solid #ddd;
}

button {
  background:var(--primary);
  color:white;
  border:none;
  cursor:pointer;
  width:100%;
}

button:hover { opacity:0.9; }

.progress {
  height:15px;
  background:#eee;
  border-radius:10px;
  overflow:hidden;
}

.progress-bar {
  height:100%;
  background:var(--info);
  width:0%;
}

li {
  display:flex;
  justify-content:space-between;
  padding:5px 0;
}

.saldo-positivo { color:green; }
.saldo-negativo { color:red; }
</style>
</head>

<body>

<div class="container">

<!-- MÊS -->
<div class="card">
<h3>📅 Mês</h3>
<input type="month" id="mes" onchange="atualizar()">
</div>

<!-- RENDAS -->
<div class="card">
<h3>💰 Rendas</h3>
<input type="text" id="nomeRenda" placeholder="Ex: Salário">
<input type="number" id="valorRenda" placeholder="Valor">
<button onclick="addRenda()">Adicionar Renda</button>

<h4>Total Entrada: R$ <span id="totalRenda">0</span></h4>
<ul id="listaRenda"></ul>
</div>

<!-- GASTOS -->
<div class="card">
<h3>🛍️ Gastos</h3>
<input type="text" id="nome" placeholder="Nome">
<input type="number" id="valor" placeholder="Valor">
<select id="categoria">
<option>Essencial</option>
<option>Estilo</option>
<option>Investimento</option>
</select>
<button onclick="addGasto()">Adicionar</button>
</div>

<!-- KPIs -->
<div class="grid">
<div class="card">
<h4>Gastos</h4>
<div class="kpi-value" id="total">R$0</div>
</div>

<div class="card">
<h4>Saldo</h4>
<div class="kpi-value" id="saldo">R$0</div>
</div>

<div class="card">
<h4>Reserva</h4>
<div class="kpi-value" id="reserva">R$0</div>
</div>
</div>

<!-- META -->
<div class="card">
<h3>🎯 Meta R$1000</h3>
<div class="progress">
<div class="progress-bar" id="barra"></div>
</div>
<p id="progresso">0%</p>
</div>

<!-- ANÁLISE -->
<div class="card">
<h3>🧠 Análise</h3>
<p id="analise"></p>
</div>

<!-- GRÁFICO -->
<div class="card">
<canvas id="grafico"></canvas>
</div>

<!-- LISTA -->
<div class="card">
<ul id="lista"></ul>
</div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("db")) || {};
let chart;

function getMes(){
  return document.getElementById("mes").value || new Date().toISOString().slice(0,7);
}

function initMes(){
  let mes = getMes();
  if(!db[mes]) db[mes] = {gastos:[],rendas:[]};
  return db[mes];
}

// RENDAS
function addRenda(){
  let mesData = initMes();

  let nome = nomeRenda.value;
  let valor = parseFloat(valorRenda.value);

  if(!nome || !valor) return alert("Preencha");

  mesData.rendas.push({nome,valor});
  salvar();

  nomeRenda.value="";
  valorRenda.value="";
  atualizar();
}

// GASTOS
function addGasto(){
  let mesData = initMes();

  let nome = document.getElementById("nome").value;
  let valor = parseFloat(document.getElementById("valor").value);
  let categoria = document.getElementById("categoria").value;

  if(!nome || !valor) return alert("Preencha");

  mesData.gastos.push({nome,valor,categoria});
  salvar();

  nome.value="";
  valor.value="";
  atualizar();
}

function removerRenda(i){
  initMes().rendas.splice(i,1);
  salvar();
  atualizar();
}

function remover(i){
  initMes().gastos.splice(i,1);
  salvar();
  atualizar();
}

function salvar(){
  let mes = getMes();
  db[mes] = initMes();
  localStorage.setItem("db",JSON.stringify(db));
}

// UPDATE
function atualizar(){

  let mesData = initMes();

  let gastos = mesData.gastos;
  let rendas = mesData.rendas;

  let totalGastos=0,reserva=0;
  let categorias={Essencial:0,Estilo:0,Investimento:0};

  let lista=document.getElementById("lista");
  let listaRenda=document.getElementById("listaRenda");

  lista.innerHTML="";
  listaRenda.innerHTML="";

  let salario=0;

  rendas.forEach((r,i)=>{
    salario+=r.valor;
    listaRenda.innerHTML+=`<li>${r.nome} - R$${r.valor} <button onclick="removerRenda(${i})">X</button></li>`;
  });

  gastos.forEach((g,i)=>{
    categorias[g.categoria]+=g.valor;

    if(g.categoria==="Investimento") reserva+=g.valor;
    else totalGastos+=g.valor;

    lista.innerHTML+=`<li>${g.nome} - R$${g.valor} <button onclick="remover(${i})">X</button></li>`;
  });

  let saldo = salario-totalGastos;

  total.innerText="R$"+totalGastos.toFixed(2);
  reservaEl.innerText="R$"+reserva.toFixed(2);
  saldoEl.innerText="R$"+saldo.toFixed(2);
  totalRenda.innerText=salario.toFixed(2);

  let meta=1000;
  let perc=Math.min((reserva/meta)*100,100);

  barra.style.width=perc+"%";
  progresso.innerText=perc.toFixed(0)+"%";

  analise.innerHTML=`
  Essenciais: ${((categorias.Essencial/salario)*100||0).toFixed(1)}%<br>
  Lazer: ${((categorias.Estilo/salario)*100||0).toFixed(1)}%<br>
  Reserva: ${((reserva/salario)*100||0).toFixed(1)}%
  `;

  renderGrafico(categorias);
}

function renderGrafico(cat){
  if(chart) chart.destroy();
  chart=new Chart(grafico,{
    type:"pie",
    data:{
      labels:Object.keys(cat),
      datasets:[{data:Object.values(cat)}]
    }
  });
}

atualizar();

</script>

</body>
</html>
