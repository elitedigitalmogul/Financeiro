<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance PRO | Dashboard</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --primary:#10b981;
    --danger:#ef4444;
    --text:#f8fafc;
    --dim:#94a3b8;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:var(--bg);
    color:var(--text);
    font-family:sans-serif;
    padding:20px;
}

.container{
    max-width:1000px;
    margin:auto;
}

.card{
    background:var(--card);
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

.grid-form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

input,select,button,textarea{
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
}

button{
    background:var(--primary);
    border:none;
    cursor:pointer;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #334155;
}

.btn-del{
    background:none;
    border:none;
    color:var(--danger);
    cursor:pointer;
}

.kpi-group{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

canvas{
    width:100%;
}
</style>
</head>

<body>

<div class="container">

<!-- INPUT -->
<div class="card">
<div class="grid-form">
<input type="month" id="mes">
<input id="nome" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">
<select id="cat">
<option value="Renda">Renda</option>
<option value="Essencial">Essencial</option>
<option value="Estilo">Estilo</option>
<option value="Investimento">Investimento</option>
</select>
<button onclick="add()">Adicionar</button>
</div>
</div>

<!-- IMPORTADOR EXTRATO -->
<div class="card">
<h3>Importar Extrato</h3>
<textarea id="extrato" placeholder="Cole aqui seu extrato"></textarea>
<button onclick="importarExtrato()">Importar</button>
</div>

<!-- KPIs -->
<div class="kpi-group">
<div class="card">Entradas<br><span id="e">0</span></div>
<div class="card">Saídas<br><span id="s">0</span></div>
<div class="card">Saldo<br><span id="saldo">0</span></div>
</div>

<!-- SCORE -->
<div class="card">
Score: <span id="score">0</span>
<div id="status"></div>
</div>

<!-- CHART -->
<div class="card">
<canvas id="chart1"></canvas>
</div>

<!-- INSIGHTS + LISTA -->
<div class="card">
<div id="insights"></div>
<div id="metaTxt"></div>
<hr style="margin:15px 0;">
<div id="lista"></div>
</div>

</div>
<script>

let db = JSON.parse(localStorage.getItem("finpro")) || {};
let chart;

const $ = id => document.getElementById(id);

$("mes").value = new Date().toISOString().slice(0,7);

function mes(){

    let m = $("mes").value;

    if(!m){
        m = new Date().toISOString().slice(0,7);
        $("mes").value = m;
    }

    return m;
}
function save(){
    localStorage.setItem("finpro", JSON.stringify(db));
}

function f(v){
    return (v||0).toLocaleString("pt-BR",{
        style:"currency",
        currency:"BRL"
    });
}

</script>
<script>

function add(){

    let m = mes();
    let n = $("nome").value;
    let v = parseFloat($("valor").value);
    let c = $("cat").value;

    if(!n || isNaN(v)) return;

    if(!db[m]) db[m] = [];

    db[m].push({
        id: Date.now(),
        nome: n,
        valor: v,
        cat: c
    });

    save();

    $("nome").value = "";
    $("valor").value = "";

    update();
}

function del(id){

    let m = mes();

    if(!db[m]) return;

    db[m] = db[m].filter(x => x.id !== id);

    save();

    update();
}

/* =========================
   IMPORTADOR DE EXTRATO
========================= */

function importarExtrato(){

    let texto = $("extrato").value;
    if(!texto) return;

    let m = mes();

    if(!db[m]) db[m] = [];

    let linhas = texto.split("\n");

    linhas.forEach(l => {

        l = l.trim();
        if(!l) return;

        let match = l.match(/-?\d+[.,]?\d*/);

        if(!match) return;

        let valor = parseFloat(match[0].replace(",", "."));

        let nome = l.replace(match[0], "").trim();

        let cat = valor >= 0 ? "Renda" : "Essencial";

        db[m].push({
            id: Date.now() + Math.random(),
            nome: nome || "Importado",
            valor: Math.abs(valor),
            cat: cat
        });
    });

    save();

    $("extrato").value = "";

    update();
}

</script>
<script>

function update(){

    let m = mes();
    let arr = db[m] || [];

    let e = 0;
    let s = 0;
    let i = 0;

    let cat = {
        Essencial: 0,
        Estilo: 0,
        Investimento: 0
    };

    let html = "";

    arr.forEach(x => {

        let v = Number(x.valor);

        if(x.cat === "Renda"){
            e += v;
        } else {
            s += v;

            if(cat[x.cat] !== undefined){
                cat[x.cat] += v;
            }

            if(x.cat === "Investimento"){
                i += v;
            }
        }

        html += `
            <div class="item">
                <div>
                    ${x.nome}<br>
                    <small style="color:var(--dim)">${x.cat}</small>
                </div>
                <div>
                    ${f(v)}
                    <button class="btn-del" onclick="del(${x.id})">×</button>
                </div>
            </div>
        `;
    });

    // LISTA
    $("lista").innerHTML = html || "Sem lançamentos neste mês";

    // KPIs
    $("e").innerText = f(e);
    $("s").innerText = f(s);
    $("saldo").innerText = f(e - s);

    // SCORE
    let score = 0;

    if(e > 0){
        score = 50;

        if(e > s) score += 20;
        if(i >= e * 0.2) score += 20;
        if(s <= e * 0.7) score += 10;
    }

    score = Math.min(Math.max(score,0),100);

    $("score").innerText = score;

    $("status").innerText =
        score >= 80 ? "Excelente" :
        score >= 50 ? "Regular" :
        "Atenção";

    // META
    $("metaTxt").innerText =
        `Meta 20%: ${f(e * 0.2)} | Investido: ${f(i)}`;

    // INSIGHTS
    $("insights").innerText =
        e < s && e > 0
        ? "⚠ Gastos acima da renda"
        : "✔ Finanças equilibradas";

    // CHART (ESTÁVEL)
    let dados = [
        cat.Essencial,
        cat.Estilo,
        cat.Investimento
    ];

    if(window.chart){
        window.chart.data.datasets[0].data = dados;
        window.chart.update();
    } else {
        window.chart = new Chart($("chart1"), {
            type: "doughnut",
            data: {
                labels: ["Essencial","Estilo","Investimento"],
                datasets: [{
                    data: dados
                }]
            }
        });
    }
}

// INICIALIZAÇÃO
update();

</script>
