    <script>
        const Utils = {
            $(id) { return document.getElementById(id); },
            format(v) { return (v||0).toLocaleString("pt-BR",{style:"currency",currency:"BRL"}); },
            parseDateBR(dateStr) {
                const [d, m, y] = dateStr.split('/');
                return `${y}-${m.padStart(2,'0')}-${d.padStart(2,'0')}`;
            }
        };

        // 🔥 PARSER NUBANK ULTRA-PRECISE v8.4.6
        class NubankParser {
            static classify(descricao) {
                const text = descricao.toLowerCase();
                
                const rendaKeywords = [
                    'pix recebido', 'transferência recebida', 'ted recebida', 'depósito',
                    'salário', 'comissão', 'freelance', 'freelancer', 'reembolso',
                    'cashback', 'restituição', 'dividendos', 'juros recebidos',
                    'pagamento recebido', 'crédito recebido'
                ];
                
                for (let keyword of rendaKeywords) {
                    if (text.includes(keyword)) return 'Renda';
                }
                
                const essencialKeywords = [
                    'carrefour', 'assai', 'atacadão', 'extra', 'pão de açúcar', 'mercado', 'supermercado',
                    'energia', 'luz', 'água', 'gás', 'internet', 'vivo', 'claro', 'tim',
                    'posto', 'gasolina', 'combustível', 'farmácia', 'drogaria', 'consulta', 'hospital'
                ];
                
                for (let keyword of essencialKeywords) {
                    if (text.includes(keyword)) return 'Essencial';
                }
                
                const estiloKeywords = [
                    'ifood', 'uber eats', 'restaurante', 'lanchonete', 'hamburgueria', 'pizzaria', 'bar',
                    'netflix', 'spotify', 'amazon prime', 'disney+', 'hbo max', 'youtube premium',
                    'shopee', 'shein', 'aliexpress', 'amazon', 'zara', 'renner', 'nike',
                    'steam', 'playstation', 'xbox', 'cinema', 'shows', 'uber', '99'
                ];
                
                for (let keyword of estiloKeywords) {
                    if (text.includes(keyword)) return 'Estilo';
                }
                
                return 'Outros';
            }
        }

        class FinanceEngine {
            constructor() {
                this.db = {}; 
                this.charts = { donut: null, bar: null };
                this.currentFilter = 'Todos';
                this.currentMonth = new Date().toISOString().slice(0,7);
                this.catColors = { 
                    Renda: '#10b981', Essencial: '#3b82f6', Estilo: '#f59e0b', 
                    Outros: '#64748b', Investimento: '#8b5cf6' 
                };
                this.schemaVersion = '8.4.6';
                this.editingId = null;
            }

            loadDB() {
                try {
                    const raw = localStorage.getItem(`finpro_v${this.schemaVersion}`);
                    this.db = raw ? JSON.parse(raw) : {};
                } catch(e) {
                    this.db = {};
                }
            }
getListaMeses() {
    // Pega os meses que já têm dados
    const mesesComDados = Object.keys(this.db).filter(k => this.db[k] && this.db[k].length > 0);
    
    const listaCompleta = [];
    const anos = [2026, 2027, 2028, 2029, 2030];
    
    // Gera todos os 12 meses para cada um dos anos
    anos.forEach(ano => {
        for (let mes = 1; mes <= 12; mes++) {
            listaCompleta.push(`${ano}-${String(mes).padStart(2, '0')}`);
        }
    });
    
    // Junta com os meses que já têm dados antigos (se houver), remove duplicados e ordena
    const listaFinal = [...new Set([...mesesComDados, ...listaCompleta])];
    return listaFinal.sort().reverse();
}

updateMonthsList() {
    const select = document.getElementById('monthSelect');
    if (!select) return;

    // Pega TODOS os meses gerados na função acima
    const mesesVisiveis = this.getListaMeses();
    const mesesNomes = ['Jan', 'Fev', 'Mar', 'Abr', 'Mai', 'Jun', 'Jul', 'Ago', 'Set', 'Out', 'Nov', 'Dez'];
    
    select.innerHTML = mesesVisiveis.map(m => {
        const temDados = this.db[m] && this.db[m].length > 0;
        const [ano, mes] = m.split('-');
        const nomeFormatado = `${mesesNomes[parseInt(mes)-1]} / ${ano}`;

        return `<option value="${m}" ${m === this.currentMonth ? 'selected' : ''}>
            ${nomeFormatado} ${temDados ? '📊' : '⚪'}
        </option>`;
    }).join('');
}
changeMonth(mesKey) {
    if (!mesKey) return;
    this.currentMonth = mesKey;
    this.update();
}
prevMonth() {
    const lista = this.getListaMeses();
    const index = lista.indexOf(this.currentMonth);
    if (index < lista.length - 1) {
        this.changeMonth(lista[index + 1]);
    }
}

nextMonth() {
    const lista = this.getListaMeses();
    const index = lista.indexOf(this.currentMonth);
    if (index > 0) {
        this.changeMonth(lista[index - 1]);
    }
}

            save() {
                localStorage.setItem(`finpro_v${this.schemaVersion}`, JSON.stringify(this.db));
            }

            importarTexto() {
                const rawData = Utils.$('textoDigitavel').value.trim();
                if (!rawData) return alert('❌ Cole o extrato primeiro!');
                
                const linhas = rawData.split('\n').filter(l => l.trim());
                let adicionados = 0;
                let preview = [];
                let stats = { Renda: 0, Essencial: 0, Estilo: 0, Outros: 0, Investimento: 0 };

                linhas.forEach((linha, index) => {
                    if (index === 0 && linha.includes('Data')) return;
                    
                    const partes = linha.split(/\t| {2,}/).map(p => p.trim());
                    if (partes.length < 4) return;
                    
                    const [dataBr, valorRaw, id, desc] = partes;
                    const valor = parseFloat(valorRaw.replace(',', '.'));
                    if (isNaN(valor)) return;
                    
                    const dataIso = Utils.parseDateBR(dataBr);
                    const [ano, mes] = dataIso.split('-').slice(0,2);
                    const mesKey = `${ano}-${mes}`;
                    
                    if (!this.db[mesKey]) this.db[mesKey] = [];
                    
                    const jaExiste = this.db[mesKey].some(item => item.id === id);
                    if (jaExiste) return;
                    
                    const cat = NubankParser.classify(desc);
                    const nome = desc.split(' - ')[1]?.slice(0,45) || desc.slice(0,45);
                    
                    this.db[mesKey].push({
                        id: id, nome, valor: Math.abs(valor), cat, data: dataIso, fonte: 'Nubank'
                    });
                    
                    adicionados++; stats[cat]++; preview.push({ nome, valor: Math.abs(valor), cat, data: dataBr });
                });

                this.save();
                this.currentMonth = Object.keys(this.db)[Object.keys(this.db).length - 1] || this.currentMonth;
                this.update();
                Utils.$('textoDigitavel').value = '';
                
                Utils.$('nubankPreview').innerHTML = `
                    <div style="font-weight:700;margin-bottom:8px;font-size:0.9rem;">📊 Resumo da importação:</div>
                    ${preview.slice(0,8).map(i => 
                        `<div class="preview-item">
                            <div style="flex:1;">${i.nome}</div>
                            <div style="text-align:right;">
                                <div style="color:${this.catColors[i.cat]};font-weight:600;font-size:0.8rem;">${i.cat}</div>
                                ${Utils.format(i.valor)}
                            </div>
                        </div>`
                    ).join('') + (preview.length > 8 ? `<div style="text-align:center;padding:12px;color:var(--dim);font-size:0.8rem;">+${preview.length-8} itens...</div>` : '')}
                `;
                Utils.$('nubankPreview').style.display = 'block';
                setTimeout(() => Utils.$('nubankPreview').style.display = 'none', 5000);
            }

            add() {
                const m = this.currentMonth;
                const n = Utils.$('nome').value.trim();
                const v = parseFloat(Utils.$('valor').value);
                const c = Utils.$('cat').value;
                if (!n || isNaN(v) || v <= 0) return alert("❌ Preencha todos os campos!");
                
                if (!this.db[m]) this.db[m] = [];
                this.db[m].push({ id: Date.now()+Math.random(), nome: n.slice(0,40), valor: v, cat: c, data: new Date().toISOString().slice(0,10) });
                this.save();
                Utils.$('nome').value = Utils.$('valor').value = '';
                this.update();
            }

            del(id) {
                const m = this.currentMonth;
                if (this.db[m]) {
                    this.db[m] = this.db[m].filter(i => i.id !== id);
                    this.save();
                    this.update();
                }
            }
        limparMesAtual() {
            const mes = this.currentMonth;
            const [ano, mesNum] = mes.split('-');
            const mesesNomes = ['Janeiro', 'Fevereiro', 'Março', 'Abril', 'Maio', 'Junho', 'Julho', 'Agosto', 'Setembro', 'Outubro', 'Novembro', 'Dezembro'];
            const nomeMes = mesesNomes[parseInt(mesNum) - 1];

            const confirmacao = confirm(`⚠️ ATENÇÃO!\n\nVocê tem certeza que deseja APAGAR TODOS os dados de ${nomeMes} de ${ano}?\nEsta ação não pode ser desfeita.`);
            
            if (confirmacao) {
                this.db[mes] = [];
                this.save();
                this.update();
                alert(`Dados de ${nomeMes} apagados com sucesso!`);
            }
        }

            filterByCategory(cat) {
                if (cat === this.currentFilter) {
                    this.currentFilter = 'Todos';
                } else {
                    this.currentFilter = cat;
                }
                this.update();
            }

            editItem(id) {
                const m = this.currentMonth;
                const item = this.db[m]?.find(i => i.id === id);
                if (!item || item.cat !== 'Outros') return;
                
                this.editingId = id;
                Utils.$('editItemInfo').textContent = `${item.nome} - ${Utils.format(item.valor)}`;
                Utils.$('editModal').style.display = 'flex';
            }

            reclassify(newCat) {
                const m = this.currentMonth;
                const item = this.db[m]?.find(i => i.id === this.editingId);
                if (item) {
                    item.cat = newCat;
                    this.save();
                    this.closeEdit();
                    this.update();
                }
            }

            closeEdit() {
                this.editingId = null;
                Utils.$('editModal').style.display = 'none';
            }

            getFilteredData() {
                const data = this.db[this.currentMonth] || [];
                return this.currentFilter === 'Todos' ? data : data.filter(i => i.cat === this.currentFilter);
            }

            update() {
                const data = this.getFilteredData();
                const allData = this.db[this.currentMonth] || [];
                const entrada = allData.filter(i => i.cat === 'Renda').reduce((a,i) => a + i.valor, 0);
                const saida = allData.filter(i => i.cat !== 'Renda').reduce((a,i) => a + i.valor, 0);
                const saldo = entrada - saida;
                
                Utils.$('e').textContent = Utils.format(entrada);
                Utils.$('s').textContent = Utils.format(saida);
                Utils.$('saldo').textContent = Utils.format(saldo);
                Utils.$('saldo').parentElement.className = `kpi-card ${saldo >= 0 ? 'txt-primary' : 'txt-danger'}`;
                
                const analise = this.analisarFinanceiro(allData);
                Utils.$('scoreText').textContent = analise.score;
                Utils.$('statusText').textContent = `${allData.length} itens`;
                Utils.$('filterCount').textContent = `(${data.length} ${this.currentFilter})`;
                
                this.renderRule(allData, entrada);
                this.renderFeedback(allData);
                this.renderList(data);
                this.renderCharts(allData);
this.updateMonthsList();
            }

            renderRule(data, entrada) {
                const essencial = data.filter(i => i.cat === 'Essencial').reduce((a,i) => a + i.valor, 0);
                const estilo = data.filter(i => i.cat === 'Estilo').reduce((a,i) => a + i.valor, 0);
                const investimento = data.filter(i => i.cat === 'Investimento').reduce((a,i) => a + i.valor, 0);
                
                if (entrada === 0) return Utils.$('ruleGrid').innerHTML = '<div style="grid-column:1/-1;text-align:center;opacity:0.5">Adicione renda para ver a regra 50-30-20</div>';
                
                const meta = { essencial: entrada*0.5, estilo: entrada*0.3, poupanca: entrada*0.2 };
                Utils.$('ruleGrid').innerHTML = `
                    <div class="rule-card rule-essential">
                        <div class="rule-title">🏠 Necessidades (50%)</div>
                        <div class="rule-value">${Utils.format(essencial)} / ${Utils.format(meta.essencial)}</div>
                        <div class="rule-progress"><div class="rule-bar" style="width:${Math.min(100,(essencial/meta.essencial)*100)}%"></div></div>
                    </div>
                    <div class="rule-card rule-want">
                        <div class="rule-title">🍔 Desejos (30%)</div>
                        <div class="rule-value">${Utils.format(estilo)} / ${Utils.format(meta.estilo)}</div>
                        <div class="rule-progress"><div class="rule-bar" style="width:${Math.min(100,(estilo/meta.estilo)*100)}%"></div></div>
                    </div>
                    <div class="rule-card rule-save">
                        <div class="rule-title">💰 Poupança (20%)</div>
                        <div class="rule-value">${Utils.format(investimento)} / ${Utils.format(meta.poupanca)}</div>
                        <div class="rule-progress"><div class="rule-bar" style="width:${Math.min(100,(investimento/meta.poupanca)*100)}%"></div></div>
                    </div>
                `;
            }

            renderFeedback(data) {
                const cats = {};
                data.forEach(i => cats[i.cat] = (cats[i.cat]||0) + i.valor);
                Utils.$('feedbackGrid').innerHTML = `
                    <div class="feedback-item"><span class="feedback-number txt-primary">${data.length}</span><span class="feedback-label">Total</span></div>
                    <div class="feedback-item"><span class="feedback-number txt-danger">${Utils.format(Math.max(...Object.values(cats)||[0]))}</span><span class="feedback-label">Maior gasto</span></div>
                    <div class="feedback-item"><span class="feedback-number">${Object.keys(cats).length}</span><span class="feedback-label">Categorias</span></div>
                `;
            }

            renderList(data) {
                Utils.$('lista').innerHTML = data.map(i => `
                    <div class="list-item">
                        <div class="list-info">
                            <div class="list-nome">${i.nome}</div>
                            <div class="list-cat">${i.cat} • ${i.data} ${i.fonte ? `• ${i.fonte}` : ''}</div>
                        </div>
                        <div style="display:flex;align-items:center;">
                            <div class="list-valor ${i.cat === 'Renda' ? 'txt-primary' : 'txt-danger'}">${Utils.format(i.valor)}</div>
                            ${i.cat === 'Outros' ? `<button class="btn-edit-outros" onclick="Finance.editItem('${i.id}')">🔄</button>` : ''}
                            <button class="btn-del" onclick="Finance.del('${i.id}')">×</button>
                        </div>
                    </div>
                `).join('') || '<div style="text-align:center;opacity:0.5;padding:40px">📝 Importe seu extrato ou adicione manualmente</div>';
            }

            renderCharts(data) {
                if (this.charts.donut) this.charts.donut.destroy();
                
                const cats = {};
                data.forEach(i => cats[i.cat] = (cats[i.cat]||0) + i.valor);
                const labels = Object.keys(cats), values = Object.values(cats);
                const colors = labels.map(c => this.catColors[c] || '#64748b');
                
                let legendHTML = '';
                labels.forEach((label, index) => {
                    legendHTML += `
                        <div class="legend-item" onclick="Finance.filterByCategory('${label}')">
                            <div class="legend-color" style="background:${colors[index]}"></div>
                            <span>${label} (${Utils.format(values[index])})</span>
                        </div>
                    `;
                });
                Utils.$('chartLegend').innerHTML = legendHTML;
                
                if (labels.length) {
                    const ctx = Utils.$('chartDonut').getContext('2d');
                    this.charts.donut = new Chart(ctx, {
                        type: 'doughnut', 
                        data: { labels, datasets: [{data:values, backgroundColor:colors}] },
                        options: { 
                            responsive:true, 
                            maintainAspectRatio:false, 
                            plugins:{legend:{display:false}},
                            onClick: (event, elements) => {
                                if (elements.length > 0) {
                                    const index = elements[0].index;
                                    this.filterByCategory(labels[index]);
                                }
                            }
                        }
                    });
                    
                    Utils.$('donutContainer').style.cursor = 'pointer';
                }
            }
            analisarFinanceiro(data) {
    if (!data || data.length === 0) {
        return { score: 0 };
    }

    const renda = data.filter(i => i.cat === 'Renda').reduce((a,i)=>a+i.valor,0);
    const essencial = data.filter(i => i.cat === 'Essencial').reduce((a,i)=>a+i.valor,0);
    const estilo = data.filter(i => i.cat === 'Estilo').reduce((a,i)=>a+i.valor,0);
    const investimento = data.filter(i => i.cat === 'Investimento').reduce((a,i)=>a+i.valor,0);

    if (renda === 0) return { score: 0 };

    // 📊 porcentagens
    const pEssencial = essencial / renda;
    const pEstilo = estilo / renda;
    const pInvest = investimento / renda;

    let score = 100;

    // ❌ Penalizações (regra 50-30-20)
    if (pEssencial > 0.5) score -= (pEssencial - 0.5) * 200;
    if (pEstilo > 0.3) score -= (pEstilo - 0.3) * 200;
    if (pInvest < 0.2) score -= (0.2 - pInvest) * 200;

    // ⚠️ proteção
    score = Math.max(0, Math.min(100, Math.round(score)));

    return { score };
}

            init() {
                this.loadDB();
                this.update();
                console.log('✅ Finance PRO v8.4.6 - NUBANK COMPACT + INTERATIVO');
            }
        }

        const Finance = new FinanceEngine();
        window.addEventListener('load', () => Finance.init());
        
        Utils.$('editModal').addEventListener('click', (e) => {
            if (e.target === Utils.$('editModal')) Finance.closeEdit();
        });
    </script>
</body>
