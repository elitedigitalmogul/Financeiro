<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Pro Dashboard</title>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #00d1b2;
            --bg: #0b0e11;
            --card-bg: #151921;
            --text: #ffffff;
            --text-dim: #8a94a6;
            --danger: #ff4757;
            --warning: #f1c40f;
            --info: #3498db;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Inter', sans-serif; background-color: var(--bg); color: var(--text); padding: 20px; }
        .container { max-width: 1000px; margin: auto; }

        .card {
            background: var(--card-bg);
            border-radius: 16px;
            padding: 20px;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }

        .grid-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 15px;
            margin-bottom: 20px;
        }

        .kpi-label { color: var(--text-dim); font-size: 0.8rem; text-transform: uppercase; margin-bottom: 5px; }
        .kpi-value { font-size: 1.5rem; font-weight: 800; }

        .input-group { display: flex; gap: 10px; flex-wrap: wrap; }
        input, select, button { 
            padding: 12px; border-radius: 10px; border: 1px solid #2d343f; 
            background: #1f242d; color: white; outline: none;
        }
        input { flex: 2; }
        button { background: var(--primary); color: #000; font-weight: 700; cursor: pointer; border: none; flex: 1; }
        button:hover { opacity: 0.8; }

        .item-lista {
            display: flex; justify-content: space-between; align-items: center;
            padding: 12px; border-bottom: 1px solid rgba(255,255,255,0.05);
        }
        .btn-delete { background: none; border: none; color: var(--danger); cursor: pointer; font-weight: bold; font-size: 1.1rem; }

        .progress-container { background: #1f242d; height: 12px; border-radius: 6px; overflow: hidden; margin: 10px 0; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.5s; box-shadow: 0 0 10px var(--primary); }

        .charts-wrapper { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; }
        @media (max-width: 768px) { .charts-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <div class="input-group">
            <input type="month" id="mesInput" onchange="atualizarGeral()">
            <input type="text" id="nome" placeholder="Descrição">
            <input type="number" id="valor" placeholder="R$ 0,00">
            <select id="categoria">
                <option value="Renda">📈 Renda (Entrada)</option>
                <option value="Essencial">🏠 Essencial</option>
                <option value="Estilo">🎨 Estilo/Lazer</option>
                <option value="Investimento">💰 Investimento</option>
            </select>
            <button onclick="adicionar()">Lançar</button>
        </div>
    </div>

    <div class="grid-kpis">
        <div class="card"><div class="kpi-label">Ganhos</div><div class="kpi-value" id="kpi-entradas">R$ 0</div></div>
        <div class="card"><div class="kpi-label">Gastos</div><div class="kpi-value" style="color: var(--danger)" id="kpi-saidas">R$ 0</div></div>
        <div class="card"><div class="kpi-label">Saldo Atual</div><div class="kpi-value" id="kpi-saldo">R$ 0</div></div>
    </div>

    <div class="card">
        <h3 style="font-size: 0.9rem; color: var(--text-dim)">🎯 MÉTRICA DE RESERVA RECOMENDADA (20%)</h3>
        <div id="metrica-texto" style="margin-top: 5px; font-weight: bold;">Meta: R$ 0,00</div>
        <div class="progress-container"><div class="progress-bar" id="meta-barra"></div></div>
        <small id="progresso-info" style="color: var(--text-dim)">Você guardou R$ 0 de R$ 0 recomendados.</small>
    </div>

    <div class="charts-wrapper">
        <div class="card"><h3>Distribuição</h3><canvas id="chartPizza"></canvas></div>
        <div class="card"><h3>Entradas vs Saídas</h3><canvas id="chartBarras"></canvas></div>
    </div>

    <div class="card">
        <h3>Histórico de Lançamentos</h3>
        <div id="lista-transacoes"></div>
    </div>
</div>

<script>
let db = JSON.parse(localStorage.getItem("financas_pro")) || {};
let pizzaChart, barChart;

const $ = id => document.getElementById(id);
$("mesInput").value = new Date().toISOString().slice(0,7);

function adicionar() {
    const mes = $("mesInput").value;
    const nome = $("nome").value;
    const valor = parseFloat($("valor").value);
    const categoria = $("categoria").value;

    if (!nome || !valor) return alert("Preencha os campos corretamente!");

    if (!db[mes]) db[mes] = [];
    db[mes].push({ id: Date.now(), nome, valor, categoria });

    localStorage.setItem("financas_pro", JSON.stringify(db));
    $("nome").value = ""; $("valor").value = "";
    atualizarGeral();
}

function remover(id) {
    const mes = $("mesInput").value;
    db[mes] = db[mes].filter(t => t.id !== id);
    localStorage.setItem("financas_pro", JSON.stringify(db));
    atualizarGeral();
}

function atualizarGeral() {
    const mes = $("mesInput").value;
    const transacoes = db[mes] || [];

    let entradas = 0, saidas = 0, investido = 0;
    let cats = { Essencial:0, Estilo:0, Investimento:0 };
    let html = "";

    transacoes.forEach(t => {
        if (t.categoria === "Renda") {
            entradas += t.valor;
        } else {
            saidas += t.valor;
            cats[t.categoria] += t.valor;
            if(t.categoria === "Investimento") investido += t.valor;
        }
        html += `
        <div class="item-lista">
            <span>${t.nome} <small style="color:var(--text-dim)">(${t.categoria})</small></span>
            <span>
                <b>R$ ${t.valor.toFixed(2)}</b>
                <button class="btn-delete" onclick="remover(${t.id})">✕</button>
            </span>
        </div>`;
    });

    $("lista-transacoes").innerHTML = html;
    $("kpi-entradas").innerText = "R$ " + entradas.toFixed(2);
    $("kpi-saidas").innerText = "R$ " + saidas.toFixed(2);
    
    const saldo = entradas - saidas;
    $("kpi-saldo").innerText = "R$ " + saldo.toFixed(2);
    $("kpi-saldo").style.color = saldo < 0 ? "var(--danger)" : "var(--primary)";

    // Lógica da Métrica (Guardar 20% do que ganha)
    const metaRecomendada = entradas * 0.20;
    const porcentagemAtingida = metaRecomendada > 0 ? Math.min((investido / metaRecomendada) * 100, 100) : 0;
    
    $("metrica-texto").innerText = `Meta de Reserva: R$ ${metaRecomendada.toFixed(2)}`;
    $("meta-barra").style.width = porcentagemAtingida + "%";
    $("progresso-info").innerText = `Você investiu R$ ${investido.toFixed(2)} de R$ ${metaRecomendada.toFixed(2)} recomendados para o seu nível de renda.`;

    renderCharts(cats, mes);
}

function renderCharts(cat, mesAtual) {
    if (pizzaChart) pizzaChart.destroy();
    pizzaChart = new Chart($("chartPizza"), {
        type: "doughnut",
        data: {
            labels: ["Essencial", "Estilo", "Investimento"],
            datasets: [{ 
                data: [cat.Essencial, cat.Estilo, cat.Investimento],
                backgroundColor: ['#3498db', '#f1c40f', '#00d1b2'],
                borderColor: "transparent"
            }]
        },
        options: { plugins: { legend: { labels: { color: '#fff' } } } }
    });

    const meses = Object.keys(db).slice(-3);
    if (barChart) barChart.destroy();
    barChart = new Chart($("chartBarras"), {
        type: "bar",
        data: {
            labels: meses,
            datasets: [
                { label: 'Entradas', data: meses.map(m => db[m].filter(t=>t.categoria==="Renda").reduce((a,t)=>a+t.valor,0)), backgroundColor: '#00d1b2' },
                { label: 'Saídas', data: meses.map(m => db[m].filter(t=>t.categoria!=="Renda").reduce((a,t)=>a+t.valor,0)), backgroundColor: '#ff4757' }
            ]
        },
        options: { 
            scales: { 
                y: { ticks: { color: '#fff' }, grid: { color: 'rgba(255,255,255,0.05)' } },
                x: { ticks: { color: '#fff' } }
            },
            plugins: { legend: { labels: { color: '#fff' } } }
        }
    });
}

atualizarGeral();
</script>
</body>
</html>
