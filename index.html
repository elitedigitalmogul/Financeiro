<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance PRO</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0b0e11;
    --card:#151921;
    --primary:#00d1b2;
    --danger:#ff4757;
    --text:#fff;
    --dim:#8a94a6;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
    background:var(--bg);
    color:var(--text);
    font-family:Arial;
    padding:20px;
}

.container{max-width:900px;margin:auto}

.card{
    background:var(--card);
    padding:15px;
    border-radius:12px;
    margin-bottom:15px;
}

input,select,button{
    padding:10px;
    border-radius:8px;
    border:none;
    margin:5px;
}

button{
    background:var(--primary);
    cursor:pointer;
    font-weight:bold;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:8px;
    border-bottom:1px solid #222;
}

.btn{
    background:none;
    color:var(--danger);
    cursor:pointer;
}
</style>
</head>

<body>

<div class="container">

<!-- INPUT -->
<div class="card">
<input type="month" id="mes">
<input id="nome" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">

<select id="cat">
    <option value="Renda">Renda</option>
    <option value="Essencial">Essencial</option>
    <option value="Estilo">Estilo</option>
    <option value="Investimento">Investimento</option>
</select>

<button onclick="add()">Adicionar</button>
</div>

<!-- KPIS -->
<div class="card">
<h3 id="e">Entradas: 0</h3>
<h3 id="s">Saídas: 0</h3>
<h3 id="saldo">Saldo: 0</h3>
<h3 id="score">Score: 0</h3>
</div>

<!-- META -->
<div class="card">
<h3>Meta de investimento (20%)</h3>
<div id="metaTxt"></div>
</div>

<!-- INSIGHTS -->
<div class="card">
<h3>Insights</h3>
<div id="insights"></div>
</div>

<!-- LISTA -->
<div class="card" id="lista"></div>

<!-- GRÁFICOS -->
<div class="card">
<canvas id="chart1"></canvas>
</div>

<div class="card">
<canvas id="chart2"></canvas>
</div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("finpro")) || {};
let c1, c2;

const $ = id => document.getElementById(id);

$("mes").value = new Date().toISOString().slice(0,7);

function mes(){ return $("mes").value; }

function save(){
    localStorage.setItem("finpro", JSON.stringify(db));
}

function add(){

    let m = mes();
    let n = $("nome").value;
    let v = parseFloat($("valor").value);
    let c = $("cat").value;

    if(!n || !v) return;

    if(!db[m]) db[m]=[];

    db[m].push({id:Date.now(),nome:n,valor:v,cat:c});

    save();
    $("nome").value="";
    $("valor").value="";
    update();
}

function del(id){
    let m = mes();
    db[m] = db[m].filter(x=>x.id!==id);
    save();
    update();
}

function update(){

    let m = mes();
    let arr = db[m] || [];

    let e=0,s=0,i=0;
    let cat = {Essencial:0,Estilo:0,Investimento:0};

    let html="";

    arr.forEach(x=>{

        if(x.cat==="Renda") e+=x.valor;
        else {
            s+=x.valor;
            cat[x.cat]+=x.valor;
            if(x.cat==="Investimento") i+=x.valor;
        }

        html+=`
        <div class="item">
            <span>${x.nome}</span>
            <span>
                ${x.valor}
                <button class="btn" onclick="del(${x.id})">x</button>
            </span>
        </div>`;
    });

    $("lista").innerHTML=html;

    $("e").innerText="Entradas: "+e;
    $("s").innerText="Saídas: "+s;
    $("saldo").innerText="Saldo: "+(e-s);

    let score = 50;
    if(e>s) score+=20;
    if(i>e*0.2) score+=20;
    if(s<e*0.7) score+=10;

    $("score").innerText="Score: "+Math.min(score,100);

    let meta = e*0.2;
    $("metaTxt").innerText=`Meta: ${meta.toFixed(2)} | Investido: ${i}`;

    $("insights").innerText =
        e<s ? "🚨 Gastos maiores que entradas" : "✔ Financeiro estável";

    if(c1) c1.destroy();
    if(c2) c2.destroy();

    c1 = new Chart($("chart1"),{
        type:"doughnut",
        data:{
            labels:Object.keys(cat),
            datasets:[{data:Object.values(cat)}]
        }
    });

    c2 = new Chart($("chart2"),{
        type:"bar",
        data:{
            labels:["Entradas","Saídas"],
            datasets:[{data:[e,s]}]
        }
    });
}

update();

</script>

</body>
</html>
