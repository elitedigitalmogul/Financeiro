<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance PRO | Dashboard</title>

<!-- CORREÇÃO CRÍTICA: Chart.js correto -->
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root{
    --bg:#0f172a;
    --card:#1e293b;
    --primary:#10b981;
    --danger:#ef4444;
    --text:#f8fafc;
    --dim:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;}
body{background:var(--bg);color:var(--text);font-family:sans-serif;padding:20px;}
.container{max-width:1000px;margin:auto;}
.card{background:var(--card);padding:20px;border-radius:16px;margin-bottom:20px;}
.grid-form{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:10px;}
input,select,button{padding:12px;border-radius:10px;border:1px solid #334155;background:#0f172a;color:#fff;}
button{background:var(--primary);border:none;cursor:pointer;}
.kpi-group{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:15px;}
.item{display:flex;justify-content:space-between;padding:10px;border-bottom:1px solid #334155;}
.btn-del{background:none;border:none;color:var(--danger);cursor:pointer;}
</style>
</head>

<body>
<div class="container">

<div class="card">
<div class="grid-form">
<input type="month" id="mes">
<input id="nome" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">
<select id="cat">
<option value="Renda">Renda</option>
<option value="Essencial">Essencial</option>
<option value="Estilo">Estilo</option>
<option value="Investimento">Investimento</option>
</select>
<button onclick="add()">Adicionar</button>
</div>
</div>

<div class="kpi-group">
<div class="card">Entradas<br><span id="e">R$ 0,00</span></div>
<div class="card">Saídas<br><span id="s">R$ 0,00</span></div>
<div class="card">Saldo<br><span id="saldo">R$ 0,00</span></div>
</div>

<div class="card">
<h3>Score: <span id="score">0</span></h3>
<div id="status"></div>
</div>

<div class="card">
<canvas id="chart1"></canvas>
</div>

<div class="card">
<div id="insights"></div>
<div id="metaTxt"></div>
<hr style="margin:15px 0;border-top:1px solid #334155;">
<div id="lista"></div>
</div>

</div>

<script>
/* ===================== SEGURANÇA BASE ===================== */
let db = {};
try {
    db = JSON.parse(localStorage.getItem("finpro")) || {};
} catch(e){
    db = {};
    console.warn("LocalStorage corrompido, resetado.");
}

let c1;
const $ = id => document.getElementById(id);
const f = v => (isNaN(v)?0:v).toLocaleString('pt-BR',{style:'currency',currency:'BRL'});

$("mes").value = new Date().toISOString().slice(0,7);

function mes(){ return $("mes").value; }

function save(){
    try{
        localStorage.setItem("finpro", JSON.stringify(db));
    }catch(e){
        console.warn("Erro ao salvar localStorage");
    }
}

/* ===================== ADD ===================== */
function add(){
    let m = mes();
    let n = $("nome").value?.trim();
    let v = parseFloat($("valor").value);
    let c = $("cat").value;

    if(!n || isNaN(v) || v <= 0) return;

    if(!db[m]) db[m]=[];
    db[m].push({id:Date.now(), nome:n, valor:v, cat:c});

    save();
    $("nome").value="";
    $("valor").value="";
    update();
}

/* ===================== DELETE ===================== */
function del(id){
    let m = mes();
    if(!db[m]) return;

    db[m] = db[m].filter(x=>x.id!==id);
    save();
    update();
}

/* ===================== UPDATE BLINDADO ===================== */
function update(){
    let m = mes();
    let arr = db[m] || [];

    let e=0,s=0,i=0;
    let cat={Essencial:0,Estilo:0,Investimento:0};

    let html="";

    for(let x of arr){
        if(x.cat==="Renda") e+=x.valor;
        else{
            s+=x.valor;
            if(cat[x.cat] !== undefined) cat[x.cat]+=x.valor;
            if(x.cat==="Investimento") i+=x.valor;
        }

        html+=`
        <div class="item">
            <div>${x.nome}<br><small style="color:var(--dim)">${x.cat}</small></div>
            <div>${f(x.valor)} <button class="btn-del" onclick="del(${x.id})">×</button></div>
        </div>`;
    }

    $("lista").innerHTML = html || "";

    $("e").innerText = f(e);
    $("s").innerText = f(s);
    $("saldo").innerText = f(e-s);

    let score = (e>0)?50:0;
    if(e>s) score+=20;
    if(i>e*0.2) score+=20;
    if(s<e*0.7) score+=10;

    $("score").innerText = Math.min(score,100);
    $("status").innerText =
        score>=80?"Excelente":
        score>=50?"Regular":"Atenção";

    $("metaTxt").innerText =
        `Meta Inv. (20%): ${f(e*0.2)} | Total Inv.: ${f(i)}`;

    $("insights").innerText =
        (e>0 && e<s)
        ?"⚠️ Gastos maiores que renda"
        :"✔ OK";

    /* ===================== CHART SAFE ===================== */
    const dados = [cat.Essencial, cat.Estilo, cat.Investimento];

    try{
        if(c1){
            c1.data.datasets[0].data = dados;
            c1.update();
        }else{
            let el = $("chart1");
            if(!el) return;

            c1 = new Chart(el,{
                type:"doughnut",
                data:{
                    labels:["Essencial","Estilo","Investimento"],
                    datasets:[{data:dados}]
                }
            });
        }
    }catch(e){
        console.warn("Erro no gráfico:",e);
    }
}

/* ===================== INIT SEGURO ===================== */
window.addEventListener("DOMContentLoaded", update);
</script>

</body>
</html>
