<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Finance PRO | Dashboard</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
:root {
    --bg:#0f172a;
    --card:#1e293b;
    --primary:#10b981;
    --danger:#ef4444;
    --text:#f8fafc;
    --dim:#94a3b8;
}

*{margin:0;padding:0;box-sizing:border-box;}

body{
    background:var(--bg);
    color:var(--text);
    font-family:sans-serif;
    padding:20px;
}

.container{max-width:1000px;margin:auto;}

.card{
    background:var(--card);
    padding:20px;
    border-radius:16px;
    margin-bottom:20px;
}

.grid-form{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(150px,1fr));
    gap:10px;
}

input,select,button{
    padding:12px;
    border-radius:10px;
    border:1px solid #334155;
    background:#0f172a;
    color:#fff;
}

button{background:var(--primary);border:none;cursor:pointer;}

.kpi-group{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(180px,1fr));
    gap:15px;
}

.item{
    display:flex;
    justify-content:space-between;
    padding:10px;
    border-bottom:1px solid #334155;
}

.btn-del{
    background:none;
    border:none;
    color:var(--danger);
    cursor:pointer;
}

</style>
</head>

<body>

<div class="container">

<div class="card">
<div class="grid-form">
<input type="month" id="mes">
<input id="nome" placeholder="Descrição">
<input id="valor" type="number" placeholder="Valor">
<select id="cat">
<option value="Renda">Renda</option>
<option value="Essencial">Essencial</option>
<option value="Estilo">Estilo</option>
<option value="Investimento">Investimento</option>
</select>
<button onclick="add()">Adicionar</button>
</div>
</div>

<div class="kpi-group">
<div class="card">Entradas<span id="e">R$ 0</span></div>
<div class="card">Saídas<span id="s">R$ 0</span></div>
<div class="card">Saldo<span id="saldo">R$ 0</span></div>
</div>

<div class="card">
<h3>Score: <span id="score">0</span></h3>
<div id="status"></div>
</div>

<div class="card">
<canvas id="chart1"></canvas>
</div>

<div class="card">
<div id="insights"></div>
<div id="metaTxt"></div>
<hr>
<div id="lista"></div>
</div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("finpro")) || {};
let c1;

const $ = id => document.getElementById(id);

$("mes").value = new Date().toISOString().slice(0,7);

let timer;

function mes(){ return $("mes").value; }

function save(){
    localStorage.setItem("finpro", JSON.stringify(db));
}

function add(){
    let m = mes();
    let n = $("nome").value;
    let v = parseFloat($("valor").value);
    let c = $("cat").value;

    if(!n || !v) return;

    if(!db[m]) db[m]=[];
    db[m].push({id:Date.now(), nome:n, valor:v, cat:c});

    save();
    $("nome").value="";
    $("valor").value="";

    updateDebounced();
}

function del(id){
    let m = mes();
    db[m] = db[m].filter(x=>x.id!==id);
    save();
    updateDebounced();
}

/* ================= OTIMIZAÇÃO ================= */

function updateDebounced(){
    clearTimeout(timer);
    timer = setTimeout(update, 80);
}

/* ================= FUNÇÕES ================= */

function update(){

    let m = mes();
    let arr = db[m]||[];

    let e=0,s=0,i=0;
    let cat={Essencial:0,Estilo:0,Investimento:0};

    let html="";

    arr.forEach(x=>{

        if(x.cat==="Renda") e+=x.valor;
        else{
            s+=x.valor;
            cat[x.cat]+=x.valor;
            if(x.cat==="Investimento") i+=x.valor;
        }

        html+=`
        <div class="item">
            <div>${x.nome}<br><small>${x.cat}</small></div>
            <div>R$ ${x.valor.toFixed(2)} <button class="btn-del" onclick="del(${x.id})">×</button></div>
        </div>`;
    });

    $("lista").innerHTML = html;

    $("e").innerText="R$ "+e.toFixed(2);
    $("s").innerText="R$ "+s.toFixed(2);
    $("saldo").innerText="R$ "+(e-s).toFixed(2);

    let score=50;
    if(e>s)score+=20;
    if(i>e*0.2)score+=20;
    if(s<e*0.7)score+=10;

    $("score").innerText=Math.min(score,100);
    $("status").innerText=score>=80?"Bom":"Ok";

    $("metaTxt").innerText=`Meta 20%: R$ ${(e*0.2).toFixed(2)} | Inv: R$ ${i.toFixed(2)}`;

    $("insights").innerText = e<s ? "⚠️ Gastos altos" : "✔ OK";

    /* ================= CHART OTIMIZADO ================= */

    if(c1){
        c1.data.datasets[0].data=[
            cat.Essencial,
            cat.Estilo,
            cat.Investimento
        ];
        c1.update();
    } else {
        c1=new Chart($("chart1"),{
            type:"doughnut",
            data:{
                labels:["Essencial","Estilo","Investimento"],
                datasets:[{
                    data:[
                        cat.Essencial,
                        cat.Estilo,
                        cat.Investimento
                    ]
                }]
            }
        });
    }
}

update();

</script>

</body>
</html>
