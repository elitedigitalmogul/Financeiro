<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finance PRO | Dashboard</title>
    <script src="https://jsdelivr.net"></script>
    <link href="https://googleapis.com" rel="stylesheet">
    <style>
        :root {
            --primary: #4361ee;
            --secondary: #3f37c9;
            --success: #4cc9f0;
            --danger: #ff4d6d;
            --bg: #f8fafe;
            --card-bg: rgba(255, 255, 255, 0.9);
            --text-main: #2b2d42;
        }

        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
            background: var(--bg);
            color: var(--text-main);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: auto;
        }

        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }

        .main-grid {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 20px;
        }

        .sidebar {
            grid-column: span 1;
        }

        .content {
            grid-column: span 2;
        }

        .card {
            background: var(--card-bg);
            backdrop-filter: blur(10px);
            padding: 25px;
            margin-bottom: 20px;
            border-radius: 24px;
            border: 1px solid rgba(255,255,255,0.3);
            box-shadow: 0 10px 30px rgba(0,0,0,0.03);
        }

        h3 { margin-top: 0; font-size: 1.2rem; color: var(--primary); }

        .kpi-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .kpi-card {
            text-align: center;
            padding: 20px;
            border-radius: 20px;
            background: white;
        }

        .kpi-value { font-size: 1.4rem; font-weight: 700; margin-top: 5px; }
        .kpi-label { font-size: 0.85rem; opacity: 0.7; }

        input, select {
            width: 100%;
            padding: 12px;
            margin: 8px 0;
            border-radius: 12px;
            border: 1px solid #e0e0e0;
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            width: 100%;
        }

        button:hover { background: var(--secondary); transform: translateY(-2px); }

        .progress-container {
            background: #edf2f7;
            height: 12px;
            border-radius: 10px;
            margin: 15px 0;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--success));
            border-radius: 10px;
            width: 0%;
            transition: 0.5s;
        }

        .list-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px;
            background: #fff;
            margin-bottom: 8px;
            border-radius: 12px;
            font-size: 0.9rem;
        }

        .btn-delete {
            background: #ffe5ec;
            color: var(--danger);
            width: 32px; height: 32px;
            padding: 0; border-radius: 8px;
        }

        .btn-delete:hover { background: var(--danger); color: white; }

        #grafico { max-height: 300px; }

        @media (max-width: 900px) {
            .main-grid { grid-template-columns: 1fr; }
            .content, .sidebar { grid-column: span 1; }
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <div>
            <h2 style="margin:0">💰 FinancePRO</h2>
            <p style="margin:0; opacity:0.6; font-size: 0.9rem;">Controle seu futuro financeiro</p>
        </div>
        <input type="month" id="mes" onchange="atualizar()" style="width: auto;">
    </header>

    <div class="main-grid">
        <!-- COLUNA ESQUERDA: INPUTS -->
        <div class="sidebar">
            <div class="card">
                <h3>📥 Entradas</h3>
                <input type="text" id="nomeRenda" placeholder="Ex: Salário Mensal">
                <input type="number" id="valorRenda" placeholder="R$ 0,00">
                <button onclick="addRenda()">Adicionar Renda</button>
            </div>

            <div class="card">
                <h3>📤 Saídas</h3>
                <input type="text" id="nomeGasto" placeholder="Ex: Aluguel">
                <input type="number" id="valorGasto" placeholder="R$ 0,00">
                <select id="categoria">
                    <option value="Essencial">🏠 Essencial</option>
                    <option value="Estilo">🍔 Estilo de Vida</option>
                    <option value="Investimento">📈 Investimento</option>
                </select>
                <button onclick="addGasto()" style="background: var(--text-main);">Registrar Gasto</button>
            </div>
        </div>

        <!-- COLUNA DIREITA: DASHBOARD -->
        <div class="content">
            <div class="kpi-grid">
                <div class="kpi-card">
                    <div class="kpi-label">Entradas</div>
                    <div class="kpi-value" id="totalRenda" style="color: var(--primary)">R$ 0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Gastos</div>
                    <div class="kpi-value" id="totalGastos" style="color: var(--danger)">R$ 0</div>
                </div>
                <div class="kpi-card">
                    <div class="kpi-label">Disponível</div>
                    <div class="kpi-value" id="saldo" style="color: var(--success)">R$ 0</div>
                </div>
            </div>

            <div class="card">
                <div style="display:flex; justify-content: space-between; align-items: center;">
                    <h3>🎯 Meta de Reserva (R$ 1.000)</h3>
                    <span id="progressoText" style="font-weight: bold;">0%</span>
                </div>
                <div class="progress-container">
                    <div class="progress-bar" id="barra"></div>
                </div>
            </div>

            <div class="main-grid" style="grid-template-columns: 1fr 1fr; gap: 20px;">
                <div class="card" style="margin-bottom:0">
                    <h3>📊 Categorias</h3>
                    <canvas id="grafico"></canvas>
                </div>
                <div class="card" style="margin-bottom:0">
                    <h3>📝 Extrato</h3>
                    <div id="lista" style="max-height: 250px; overflow-y: auto;"></div>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem("db")) || {};
    let chart;

    const getEl = id => document.getElementById(id);

    function initMes() {
        let mes = getEl("mes").value || new Date().toISOString().slice(0, 7);
        if (!db[mes]) db[mes] = { gastos: [], rendas: [] };
        return db[mes];
    }

    function addRenda() {
        let mesData = initMes();
        let nome = getEl("nomeRenda").value;
        let valor = parseFloat(getEl("valorRenda").value);
        if (!nome || isNaN(valor)) return;
        mesData.rendas.push({ nome, valor });
        salvar();
        getEl("nomeRenda").value = ""; getEl("valorRenda").value = "";
        atualizar();
    }

    function addGasto() {
        let mesData = initMes();
        let nome = getEl("nomeGasto").value;
        let valor = parseFloat(getEl("valorGasto").value);
        let categoria = getEl("categoria").value;
        if (!nome || isNaN(valor)) return;
        mesData.gastos.push({ nome, valor, categoria });
        salvar();
        getEl("nomeGasto").value = ""; getEl("valorGasto").value = "";
        atualizar();
    }

    function removerRenda(i) { initMes().rendas.splice(i, 1); salvar(); atualizar(); }
    function removerGasto(i) { initMes().gastos.splice(i, 1); salvar(); atualizar(); }

    function salvar() {
        let mes = getEl("mes").value;
        localStorage.setItem("db", JSON.stringify(db));
    }

    function atualizar() {
        let mesData = initMes();
        let totalR = 0, totalG = 0, reserva = 0;
        let catData = { Essencial: 0, Estilo: 0, Investimento: 0 };
        
        let lista = getEl("lista");
        lista.innerHTML = "";

        mesData.rendas.forEach((r, i) => totalR += r.valor);
        mesData.gastos.forEach((g, i) => {
            catData[g.categoria] += g.valor;
            if (g.categoria === "Investimento") reserva += g.valor;
            else totalG += g.valor;
            lista.innerHTML += `
                <div class="list-item">
                    <span>${g.nome} <br><small style="opacity:0.5">${g.categoria}</small></span>
                    <div>
                        <b>R$ ${g.valor.toFixed(2)}</b>
                        <button class="btn-delete" onclick="removerGasto(${i})">×</button>
                    </div>
                </div>`;
        });

        getEl("totalRenda").innerText = "R$ " + totalR.toFixed(2);
        getEl("totalGastos").innerText = "R$ " + totalG.toFixed(2);
        getEl("saldo").innerText = "R$ " + (totalR - totalG - reserva).toFixed(2);

        let perc = Math.min((reserva / 1000) * 100, 100);
        getEl("barra").style.width = perc + "%";
        getEl("progressoText").innerText = perc.toFixed(0) + "%";

        renderGrafico(catData);
    }

    function renderGrafico(cat) {
        if (chart) chart.destroy();
        chart = new Chart(getEl("grafico"), {
            type: 'doughnut',
            data: {
                labels: ['Essencial', 'Estilo', 'Investimento'],
                datasets: [{
                    data: Object.values(cat),
                    backgroundColor: ['#4361ee', '#4cc9f0', '#4895ef'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { position: 'bottom' } }, cutout: '70%' }
        });
    }

    window.onload = () => {
        getEl("mes").value = new Date().toISOString().slice(0, 7);
        atualizar();
    };
</script>
</body>
</html>
