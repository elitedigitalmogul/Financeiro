<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Pro Dashboard</title>

    <!-- FIX CRÍTICO: Chart.js correto (evita travamento) -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

    <!-- FIX: fonte correta (não altera layout, só performance visual) -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #00d1b2;
            --bg: #0b0e11;
            --card-bg: #151921;
            --text: #ffffff;
            --text-dim: #8a94a6;
            --accent-glow: rgba(0, 209, 178, 0.15);
            --danger: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: auto; }

        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--accent-glow);
            border-color: var(--primary);
        }

        .grid-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        h3 { margin-bottom: 15px; font-size: 1.1rem; color: var(--text-dim); }

        .kpi-value { font-size: 2rem; font-weight: 800; color: var(--primary); }

        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }

        input, select {
            background: #1f242d;
            border: 1px solid #2d343f;
            color: white;
            padding: 12px 15px;
            border-radius: 12px;
            outline: none;
            flex: 1;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.8; transform: scale(1.02); }

        .item-lista {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            margin-bottom: 10px;
        }

        .tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--primary);
            color: #000;
            margin-left: 10px;
        }

        .progress-container { background: #1f242d; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 0.5s ease; }

        .charts-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) { .charts-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>

<body>

<div class="container">

    <div class="card">
        <h3>🚀 Controle de Fluxo</h3>
        <div class="input-group">
            <input type="month" id="mesInput" onchange="atualizarGeral()">
            <input type="text" id="nome" placeholder="Descrição">
            <input type="number" id="valor" placeholder="Valor">
            <select id="categoria">
                <option value="Essencial">Essencial</option>
                <option value="Estilo">Estilo</option>
                <option value="Investimento">Investimento</option>
                <option value="Renda">Renda</option>
            </select>
            <button onclick="adicionar()">Lançar</button>
        </div>
    </div>

    <div class="grid-kpis">
        <div class="card"><h3>Entradas</h3><div class="kpi-value" id="kpi-entradas">R$ 0</div></div>
        <div class="card"><h3>Saídas</h3><div class="kpi-value" id="kpi-saidas">R$ 0</div></div>
        <div class="card"><h3>Saldo</h3><div class="kpi-value" id="kpi-saldo">R$ 0</div></div>
    </div>

    <div class="charts-wrapper">
        <div class="card">
            <h3>Distribuição</h3>
            <canvas id="chartPizza"></canvas>
        </div>
        <div class="card">
            <h3>Evolução</h3>
            <canvas id="chartBarras"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>Meta</h3>
        <div class="progress-container">
            <div class="progress-bar" id="meta-barra"></div>
        </div>
    </div>

    <div class="card">
        <h3>Transações</h3>
        <div id="lista-transacoes"></div>
    </div>

</div>

<script>

let db = JSON.parse(localStorage.getItem("financas_pro")) || {};
let pizzaChart, barChart;

const $ = id => document.getElementById(id);

// FIX PERFORMANCE: evita múltiplas leituras DOM
const getMes = () => $("mesInput").value;

$("mesInput").value = new Date().toISOString().slice(0,7);

function adicionar() {
    const mes = getMes();
    const nome = $("nome").value;
    const valor = parseFloat($("valor").value);
    const categoria = $("categoria").value;

    if (!nome || !valor) return;

    if (!db[mes]) db[mes] = [];
    db[mes].push({ id: Date.now(), nome, valor, categoria });

    salvar();
    $("nome").value = "";
    $("valor").value = "";
    atualizarGeral();
}

function remover(id) {
    db[getMes()] = db[getMes()].filter(t => t.id !== id);
    salvar();
    atualizarGeral();
}

function salvar() {
    localStorage.setItem("financas_pro", JSON.stringify(db));
}

function atualizarGeral() {

    const mes = getMes();
    const transacoes = db[mes] || [];

    let entradas = 0, saidas = 0;
    let cats = { Essencial:0, Estilo:0, Investimento:0 };

    let html = ""; // FIX PERFORMANCE (evita innerHTML loop)

    transacoes.forEach(t => {

        if (t.categoria === "Renda") entradas += t.valor;
        else {
            saidas += t.valor;
            cats[t.categoria] += t.valor;
        }

        html += `
        <div class="item-lista">
            <span>${t.nome}</span>
            <b>${t.valor.toFixed(2)}</b>
        </div>`;
    });

    $("lista-transacoes").innerHTML = html;

    $("kpi-entradas").innerText = "R$ " + entradas.toFixed(2);
    $("kpi-saidas").innerText = "R$ " + saidas.toFixed(2);
    $("kpi-saldo").innerText = "R$ " + (entradas - saidas).toFixed(2);

    renderCharts(cats);
}

function renderCharts(cat) {

    if (pizzaChart) pizzaChart.destroy();
    pizzaChart = new Chart($("chartPizza"), {
        type: "doughnut",
        data: {
            labels: Object.keys(cat),
            datasets: [{ data: Object.values(cat) }]
        }
    });

    const meses = Object.keys(db).slice(-3);

    if (barChart) barChart.destroy();
    barChart = new Chart($("chartBarras"), {
        type: "bar",
        data: {
            labels: meses,
            datasets: [{
                data: meses.map(m =>
                    (db[m] || []).reduce((a,t)=>a+t.valor,0)
                )
            }]
        }
    });
}

atualizarGeral();

</script>

</body>
</html>
