<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fintech Pro Dashboard</title>
    <script src="https://jsdelivr.net"></script>
    <style>
        :root {
            --primary: #00d1b2;
            --bg: #0b0e11;
            --card-bg: #151921;
            --text: #ffffff;
            --text-dim: #8a94a6;
            --accent-glow: rgba(0, 209, 178, 0.15);
            --danger: #ff4757;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            padding: 40px 20px;
            line-height: 1.6;
        }

        .container { max-width: 1100px; margin: auto; }

        /* Estilo Fintech Cards */
        .card {
            background: var(--card-bg);
            border-radius: 20px;
            padding: 25px;
            margin-bottom: 24px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            transition: all 0.3s ease;
        }

        .card:hover {
            transform: translateY(-5px);
            box-shadow: 0 15px 40px var(--accent-glow);
            border-color: var(--primary);
        }

        .grid-kpis {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        h3 { margin-bottom: 15px; font-size: 1.1rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }

        .kpi-value { font-size: 2rem; font-weight: 800; color: var(--primary); }

        /* Inputs e Botões Estilizados */
        .input-group { display: flex; gap: 10px; flex-wrap: wrap; margin-bottom: 20px; }

        input, select {
            background: #1f242d;
            border: 1px solid #2d343f;
            color: white;
            padding: 12px 15px;
            border-radius: 12px;
            outline: none;
            flex: 1;
        }

        button {
            background: var(--primary);
            color: #000;
            border: none;
            padding: 12px 25px;
            border-radius: 12px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover { opacity: 0.8; transform: scale(1.02); }

        /* Lista de Transações */
        .item-lista {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px;
            background: rgba(255,255,255,0.02);
            border-radius: 12px;
            margin-bottom: 10px;
            cursor: pointer;
        }

        .item-lista:hover { background: rgba(255,255,255,0.05); }

        .tag {
            font-size: 0.7rem;
            padding: 4px 8px;
            border-radius: 6px;
            background: var(--primary);
            color: #000;
            margin-left: 10px;
        }

        /* Barra de Progresso */
        .progress-container { background: #1f242d; height: 10px; border-radius: 5px; margin-top: 10px; overflow: hidden; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: width 1s ease; box-shadow: 0 0 15px var(--primary); }

        .charts-wrapper {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        @media (max-width: 768px) { .charts-wrapper { grid-template-columns: 1fr; } }
    </style>
</head>
<body>

<div class="container">
    <div class="card">
        <h3>🚀 Controle de Fluxo</h3>
        <div class="input-group">
            <input type="month" id="mesInput" onchange="atualizarGeral()">
            <input type="text" id="nome" placeholder="Descrição (ex: Aluguel)">
            <input type="number" id="valor" placeholder="R$ 0,00">
            <select id="categoria">
                <option value="Essencial">🏠 Essencial</option>
                <option value="Estilo">🎨 Estilo de Vida</option>
                <option value="Investimento">💰 Investimento</option>
                <option value="Renda">📈 Renda/Salário</option>
            </select>
            <button onclick="adicionar()">Lançar</button>
        </div>
    </div>

    <div class="grid-kpis">
        <div class="card">
            <h3>Entradas</h3>
            <div class="kpi-value" id="kpi-entradas">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Saídas</h3>
            <div class="kpi-value" style="color: var(--danger)" id="kpi-saidas">R$ 0,00</div>
        </div>
        <div class="card">
            <h3>Saldo Livre</h3>
            <div class="kpi-value" id="kpi-saldo">R$ 0,00</div>
        </div>
    </div>

    <div class="charts-wrapper">
        <div class="card">
            <h3>Distribuição Mensal</h3>
            <canvas id="chartPizza" height="250"></canvas>
        </div>
        <div class="card">
            <h3>Evolução de Gastos</h3>
            <canvas id="chartBarras" height="250"></canvas>
        </div>
    </div>

    <div class="card">
        <h3>🎯 Meta de Reserva (R$ 2.000)</h3>
        <div class="progress-container">
            <div class="progress-bar" id="meta-barra"></div>
        </div>
        <p id="meta-texto" style="margin-top:10px; font-size: 0.9rem;"></p>
    </div>

    <div class="card">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h3>Transações do Mês</h3>
            <select id="filtroCat" onchange="atualizarGeral()" style="flex:none; width: 150px;">
                <option value="Todos">Todos</option>
                <option value="Essencial">Essencial</option>
                <option value="Estilo">Estilo</option>
                <option value="Investimento">Investimento</option>
            </select>
        </div>
        <div id="lista-transacoes"></div>
    </div>
</div>

<script>
    let db = JSON.parse(localStorage.getItem("financas_pro")) || {};
    let pizzaCtx, barrasCtx;

    // Iniciar com mês atual
    document.getElementById("mesInput").value = new Date().toISOString().slice(0, 7);

    function getMes() { return document.getElementById("mesInput").value; }

    function adicionar() {
        const nome = document.getElementById("nome").value;
        const valor = parseFloat(document.getElementById("valor").value);
        const categoria = document.getElementById("categoria").value;
        const mes = getMes();

        if(!nome || !valor) return alert("Preencha os dados corretamente");

        if(!db[mes]) db[mes] = [];
        db[mes].push({ id: Date.now(), nome, valor, categoria });
        
        salvar();
        document.getElementById("nome").value = "";
        document.getElementById("valor").value = "";
        atualizarGeral();
    }

    function remover(id) {
        db[getMes()] = db[getMes()].filter(t => t.id !== id);
        salvar();
        atualizarGeral();
    }

    function editar(id) {
        const novoValor = prompt("Digite o novo valor:");
        if (novoValor && !isNaN(novoValor)) {
            const transacao = db[getMes()].find(t => t.id === id);
            transacao.valor = parseFloat(novoValor);
            salvar();
            atualizarGeral();
        }
    }

    function salvar() {
        localStorage.setItem("financas_pro", JSON.stringify(db));
    }

    function atualizarGeral() {
        const mes = getMes();
        const transacoes = db[mes] || [];
        const filtro = document.getElementById("filtroCat").value;
        
        let entradas = 0, saidas = 0, investimentos = 0;
        let cats = { Essencial: 0, Estilo: 0, Investimento: 0 };

        const listaEl = document.getElementById("lista-transacoes");
        listaEl.innerHTML = "";

        transacoes.forEach(t => {
            if (t.categoria === "Renda") {
                entradas += t.valor;
            } else {
                saidas += t.valor;
                cats[t.categoria] += t.valor;
                if(t.categoria === "Investimento") investimentos += t.valor;
            }

            // Renderizar Lista com Filtro
            if(filtro === "Todos" || t.categoria === filtro) {
                listaEl.innerHTML += `
                    <div class="item-lista" onclick="editar(${t.id})">
                        <div>
                            <b>${t.nome}</b>
                            <span class="tag">${t.categoria}</span>
                        </div>
                        <div>
                            <span style="color: ${t.categoria === 'Renda' ? 'var(--primary)' : 'var(--danger)'}">
                                ${t.categoria === 'Renda' ? '+' : '-'} R$ ${t.valor.toFixed(2)}
                            </span>
                            <button onclick="event.stopPropagation(); remover(${t.id})" style="background:none; color:var(--danger); padding:0; margin-left:15px">✕</button>
                        </div>
                    </div>
                `;
            }
        });

        // Atualizar KPIs
        document.getElementById("kpi-entradas").innerText = `R$ ${entradas.toFixed(2)}`;
        document.getElementById("kpi-saidas").innerText = `R$ ${saidas.toFixed(2)}`;
        document.getElementById("kpi-saldo").innerText = `R$ ${(entradas - saidas).toFixed(2)}`;

        // Meta de Reserva
        const meta = 2000;
        const perc = Math.min((investimentos / meta) * 100, 100);
        document.getElementById("meta-barra").style.width = perc + "%";
        document.getElementById("meta-texto").innerText = `${perc.toFixed(1)}% da meta atingida este mês`;

        renderCharts(cats);
    }

    function renderCharts(catsData) {
        // Gráfico de Pizza
        if(pizzaCtx) pizzaCtx.destroy();
        pizzaCtx = new Chart(document.getElementById("chartPizza"), {
            type: 'doughnut',
            data: {
                labels: Object.keys(catsData),
                datasets: [{
                    data: Object.values(catsData),
                    backgroundColor: ['#00d1b2', '#f39c12', '#9b59b6'],
                    borderWidth: 0
                }]
            },
            options: { plugins: { legend: { labels: { color: '#fff' } } } }
        });

        // Gráfico de Evolução (Últimos 3 meses existentes no DB)
        const meses = Object.keys(db).sort().slice(-3);
        const gastosPorMes = meses.map(m => {
            return db[m].filter(t => t.categoria !== "Renda").reduce((acc, t) => acc + t.valor, 0);
        });

        if(barrasCtx) barrasCtx.destroy();
        barrasCtx = new Chart(document.getElementById("chartBarras"), {
            type: 'bar',
            data: {
                labels: meses,
                datasets: [{
                    label: 'Total de Gastos',
                    data: gastosPorMes,
                    backgroundColor: 'rgba(0, 209, 178, 0.5)',
                    borderColor: '#00d1b2',
                    borderWidth: 1
                }]
            },
            options: {
                scales: {
                    y: { ticks: { color: '#8a94a6' }, grid: { color: '#2d343f' } },
                    x: { ticks: { color: '#8a94a6' }, grid: { display: false } }
                }
            }
        });
    }

    atualizarGeral();
</script>

</body>
</html>
